<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弥生CSV変換ツール（統合版）</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            transition: background 0.4s ease;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }
        /* パスワード認証画面 */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .auth-box {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-icon { font-size: 48px; margin-bottom: 16px; }
        .auth-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 28px; }
        .auth-input-wrap { margin-bottom: 12px; }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 2px;
            box-sizing: border-box;
        }
        .auth-input:focus { border-color: #e67e22; }
        .auth-input.error {
            border-color: #e74c3c;
            animation: authShake 0.4s ease;
        }
        @keyframes authShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .auth-error-msg { color: #e74c3c; font-size: 13px; margin-bottom: 12px; min-height: 20px; }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 20px;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-line-guide {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
        }
        .auth-line-guide p { font-size: 13px; color: #555; margin: 0 0 12px 0; line-height: 1.6; }
        .auth-line-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #06c755;
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .auth-line-link:hover { opacity: 0.9; }
        /* 利用規約画面 */
        .terms-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .terms-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 560px;
            max-width: 92vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .terms-icon { font-size: 40px; margin-bottom: 12px; }
        .terms-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 6px; }
        .terms-subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
        .terms-content {
            text-align: left;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 20px;
            max-height: 45vh;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.8;
            color: #333;
            flex-shrink: 1;
        }
        .terms-content h3 {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            margin: 16px 0 8px 0;
        }
        .terms-content h3:first-child { margin-top: 0; }
        .terms-content p { margin: 0 0 8px 0; }
        .terms-content ul { margin: 0 0 8px 0; padding-left: 20px; }
        .terms-content li { margin-bottom: 4px; }
        .terms-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .terms-btn:hover { opacity: 0.9; }
    </style>
<script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://esm.sh/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://esm.sh/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://esm.sh/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0?external=rxjs",
    "@angular/compiler": "https://esm.sh/@angular/compiler@^21.1.1?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.1.1?external=rxjs",
    "@angular/common": "https://esm.sh/@angular/common@^21.1.1?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.1.1?external=rxjs",
    "@angular/forms": "https://esm.sh/@angular/forms@^21.1.1?external=rxjs",
    "encoding-japanese": "https://esm.sh/encoding-japanese@2.2.0"
  }
}
</script>

</head>
<body class="bg-gradient-to-br from-[#d97706] to-[#b45309] min-h-screen p-5">
    <app-root></app-root>
</body>
</html>
